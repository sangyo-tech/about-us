name: Fix furusawa-t corrupted line

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix corrupted specialty line
        run: |
          python3 -c "
          import re
          f = 'instructors/instructor-furusawa-t.html'
          with open(f, 'rb') as fh:
              b = fh.read()
          # The line contains corrupted bytes for 製 character
          # Match: <li>研究所 + any bytes + 教育</li> on the first specialty li
          # Use regex on bytes to find and replace
          old = re.compile(rb'<li>[^<]*QC[^<]*</li>')
          matches = old.findall(b)
          print('Found matches:', [m.decode('utf-8', errors='replace') for m in matches])
          # Replace first match (the specialty area one)
          if matches:
              b = b.replace(matches[0], '<li>研究所を対象とした品質管理手法教育</li>'.encode('utf-8'), 1)
          with open(f, 'wb') as fh:
              fh.write(b)
          print('Done')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: 専門領域の壊れた文字を修正"
          git push
