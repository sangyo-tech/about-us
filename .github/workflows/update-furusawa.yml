name: Update furusawa-t profile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update instructor-furusawa-t.html
        run: |
          python3 -c "
          import re
          f = 'instructors/instructor-furusawa-t.html'
          with open(f, 'r', encoding='utf-8') as fh:
              t = fh.read()
          # 1. Profile section
          t = t.replace(
              '出光興産株式会社にて、石油・エネルギー分野の研究所を対象とした品質管理手法教育を担当してきました。日科技連QCセミナー ベーシックコースを修了し、保安力向上センターの保安力評価推進員として、製造部門の自己評価と改善活動の推進に携わっています。長年にわたり「品質管理の基礎をいかに現場へ伝えるか」に取り組んできた経験を活かし、産業技術アカデミーのコンテンツ監修を担当します。',
              '日科技連のQCセミナー ベーシックコースを修了し、出光興産株式会社にて化学分野の研究所を対象とした品質管理手法教育を担当しました。また、保安力向上センターの保安力評価推進員として、製造部門の自己評価と改善活動の推進に携わりました。「品質管理」「業務改善」「安全管理」の切り口で、事業所と本社が一丸となって競争力を向上させる取り組み経験を活かし、産業技術アカデミーのコンテンツ監修を担当します。'
          )
          # 2. Specialty area items
          t = t.replace('研究所・製造部門を対象とした品質管理手法（QC）教育', '研究所を対象とした品質管理手法教育')
          t = t.replace('品質管理の基礎を現場で理解されるかたちに落とし込む教材表現', '品質管理や業務改善の基本的な進め方を理解される形に落とし込む教材表現')
          # 3. Career section
          t = t.replace('石油・エネルギー研究所／製造部門　品質管理教育・保安力評価推進', '化学分野の研究所での品質管理教育／製造部門の保安力評価推進')
          t = t.replace('研究所を対象とした品質管理手法教育（QC教育）を担当。保安力向上センターの保安力評価推進員として、製造部門の自己評価と改善活動を推進。', '研究所を対象とした品質管理手法教育（QC教育）を担当。保安力向上センターの保安力評価推進員として、製造部門の保安力評価（自己評価）と改善活動を推進')
          # 4. Review area section
          t = t.replace('品質管理教育として伝えるべき基礎、研究所・製造部門の自己評価、そして改善活動へつながる説明の妥当性を確認します。', '品質管理教育として伝えるべき基礎、そして改善活動へつながる説明の妥当性を確認します。')
          t = t.replace('<li>品質管理手法教育の実務経験にもとづく内容確認</li>', '<li>実務経験に基づく品質管理手法教育の内容確認</li>')
          t = t.replace('<li>製造部門の保安力評価と改善活動の観点からの妥当性確認</li>', '<li>業務改善活動推進の観点からの妥当性確認</li>')
          t = t.replace('<li>現場で理解される教材表現になっているかの確認</li>', '')
          with open(f, 'w', encoding='utf-8') as fh:
              fh.write(t)
          print('Done')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: 古澤俊宏プロフィール更新"
          git push
