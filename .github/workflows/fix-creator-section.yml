name: Fix creator section
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix creator section
        run: |
          python3 << 'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              t = f.read()

          marker = 'class="producer-card"'
          idx = t.find(marker)
          if idx == -1:
              print("ERROR: producer-card not found")
              exit(1)

          start = t.rfind('<div', 0, idx)
          if start == -1:
              print("ERROR: div start not found")
              exit(1)

          depth = 0
          i = start
          end = -1
          while i < len(t):
              if t[i:i+4] == '<div':
                  depth += 1
                  i += 4
              elif t[i:i+6] == '</div>':
                  depth -= 1
                  if depth == 0:
                      end = i + 6
                      break
                  i += 6
              else:
                  i += 1

          if end == -1:
              print("ERROR: end not found")
              exit(1)

          producer_card = t[start:end]
          print(f"producer-card: {len(producer_card)} chars")

          marker2 = 'class="supervisor-board"'
          idx2 = t.find(marker2)
          sup_section = ""
          if idx2 > -1:
              start2 = t.rfind('<section', 0, idx2)
              if start2 > -1:
                  depth = 0
                  i = start2
                  end2 = -1
                  while i < len(t):
                      if t[i:i+8] == '<section':
                          depth += 1
                          i += 8
                      elif t[i:i+10] == '</section>':
                          depth -= 1
                          if depth == 0:
                              end2 = i + 10
                              break
                          i += 10
                      else:
                          i += 1
                  if end2 > -1:
                      sup_section = t[start2:end2]
                      print(f"supervisor-board: {len(sup_section)} chars")

          link = '      <div style="margin-top: 2rem; text-align: center;">\n'
          link += '        <a href="/instructors/" class="btn primary" style="display: inline-flex; align-items: center; gap: 0.5rem;">\n'
          link += '          \u76E3\u4FEE\u8005\u30FB\u8B1B\u5E2B\u4E00\u89A7\u3092\u898B\u308B\n'
          link += '          <span style="font-size: 1.2em;">\u2192</span>\n'
          link += '        </a>\n'
          link += '      </div>'

          t = t.replace(producer_card, link)
          if sup_section:
              t = t.replace(sup_section, '')

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(t)
          print("SUCCESS")
          PYEOF
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "fix: replace broken producer/supervisor cards with link to instructors page"
          git push
      - name: Cleanup
        run: |
          git rm .github/workflows/fix-creator-section.yml
          git commit -m "chore: remove one-time workflow"
          git push
