name: Remove 120years stat
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove 120years stat-item
        run: |
          python3 << 'PYEOF'
          import re
          f = 'instructors/index.html'
          with open(f, 'r', encoding='utf-8') as fh:
              t = fh.read()
          t = re.sub(r'\s*<div class="stat-item">\s*<div class="stat-num">120.*?</div>\s*<div class="stat-label">累計実務経験</div>\s*</div>', '', t, flags=re.DOTALL)
          with open(f, 'w', encoding='utf-8') as fh:
              fh.write(t)
          print('Done')
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: 120年+累計実務経験を削除"
          git push
