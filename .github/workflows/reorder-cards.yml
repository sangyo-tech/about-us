name: Reorder cards and remove stats-bar
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reorder cards and remove stats-bar
        run: |
          python3 << 'PYEOF'
          import re

          f = 'instructors/index.html'
          with open(f, 'r', encoding='utf-8') as fh:
              t = fh.read()

          # 1. Remove stats-bar (between </header> and <main)
          sb_start = t.find('<div class="stats-bar">')
          if sb_start >= 0:
              depth = 0
              i = sb_start
              sb_end = -1
              while i < len(t):
                  if t[i:i+4] == '<div':
                      depth += 1
                      i += 4
                  elif t[i:i+6] == '</div>':
                      depth -= 1
                      if depth == 0:
                          sb_end = i + 6
                          break
                      i += 6
                  else:
                      i += 1
              if sb_end > 0:
                  while sb_start > 0 and t[sb_start-1] in '\n\r':
                      sb_start -= 1
                  while sb_end < len(t) and t[sb_end] in '\n\r':
                      sb_end += 1
                  t = t[:sb_start] + '\n' + t[sb_end:]
                  print('Stats-bar removed')

          # 2. Extract cards using string find (no regex)
          def get_card(html, name):
              marker = '<!-- ' + name + ' -->'
              idx = html.find(marker)
              assert idx >= 0, f'Comment not found: {name}'
              art_end_tag = '</article>'
              end = html.find(art_end_tag, idx)
              assert end >= 0, f'Article end not found: {name}'
              end += len(art_end_tag)
              return html[idx:end]

          furusawa = get_card(t, '\u53e4\u6fa4 \u548c\u4fca')
          matsumoto = get_card(t, '\u677e\u672c \u6075\u548c')
          ando = get_card(t, '\u5b89\u85e4 \u9686')
          matsuda = get_card(t, '\u677e\u7530 \u6b63\u5247')
          furusawa_t = get_card(t, '\u53e4\u6fa4 \u4fca\u5b8f')

          print('All 5 cards extracted')

          # 3. Build new layout
          nl = '\n'
          new_section = f'<div class="grid-bottom" style="margin-top:0">{nl}{nl}'
          new_section += furusawa + nl + nl + matsumoto
          new_section += f'{nl}{nl}</div>{nl}{nl}<div class="grid" style="margin-top:28px">{nl}{nl}'
          new_section += ando + nl + nl + matsuda + nl + nl + furusawa_t
          new_section += f'{nl}{nl}</div>{nl}'

          # 4. Replace grid section
          grid_start = t.find('<div class="grid">')
          assert grid_start >= 0, 'Grid not found'
          # Find the </div> that closes wrap, just before </main>
          main_idx = t.find('</main>')
          assert main_idx >= 0, 'Main not found'
          wrap_close = t.rfind('</div>', grid_start, main_idx)
          assert wrap_close >= 0, 'Wrap close not found'

          t = t[:grid_start] + new_section + t[wrap_close:]

          with open(f, 'w', encoding='utf-8') as fh:
              fh.write(t)
          print('Done - cards reordered')
          PYEOF
      - name: Self-cleanup
        run: rm -f .github/workflows/reorder-cards.yml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: stats-bar\u524a\u9664+\u8b1b\u5e2b\u30ab\u30fc\u30c9\u4e26\u3073\u9806\u5909\u66f4"
          git push
