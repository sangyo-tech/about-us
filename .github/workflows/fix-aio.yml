name: Fix AIO metadata
on: workflow_dispatch
permissions:
  contents: write
  jobs:
    fix:
        runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v4
                        - name: Fix typo and add FAQ JSON-LD
                                run: |
                                          python3 << 'PYEOF'
                                                    import re

                                                              with open('index.html', 'r', encoding='utf-8') as f:
                                                                            t = f.read()

                                                                                      # 1. Fix typo
                                                                                                t = t.replace('アhカデミー', 'アカデミー')

                                                                                                          # 2. Add FAQPage JSON-LD + BreadcrumbList before </head>
                                                                                                                    faq_jsonld = '''<script type="application/ld+json">
                                                                                                                              {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[
                                                                                                                                        {"@type":"Question","name":"産業技術アカデミーは誰が運営していますか？","acceptedAnswer":{"@type":"Answer","text":"Qulio合同会社が運営する製造業向けeラーニングサービスです。"}},
                                                                                                                                                  {"@type":"Question","name":"どの業界の教材がありますか？","acceptedAnswer":{"@type":"Answer","text":"化粧品・医療機器・自動車部品・包装資材・食品・石油の6業界の実務経験を反映した教材を提供しています。"}},
                                                                                                                                                            {"@type":"Question","name":"教材の監修者は誰ですか？","acceptedAnswer":{"@type":"Answer","text":"品質管理・品質保証・監査・教育に強い製造業実務経験者が監修しています。詳細は講師一覧ページをご覧ください。"}}
                                                                                                                                                                      ]}
                                                                                                                                                                                </script>
                                                                                                                                                                                          <script type="application/ld+json">
                                                                                                                                                                                                    {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
                                                                                                                                                                                                              {"@type":"ListItem","position":1,"name":"トップ","item":"https://sangyo-tech.jp/"},
                                                                                                                                                                                                                        {"@type":"ListItem","position":2,"name":"私たちについて","item":"https://about-us.sangyo-tech.jp/"}
                                                                                                                                                                                                                                  ]}
                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                      '''
                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                if 'FAQPage' not in t:
                                                                                                                                                                                                                                                                              t = t.replace('</head>', faq_jsonld + '</head>')
                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                        with open('index.html', 'w', encoding='utf-8') as f:
                                                                                                                                                                                                                                                                                                      f.write(t)
                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                print('Done: typo fixed, FAQ+Breadcrumb added')
                                                                                                                                                                                                                                                                                                                          PYEOF
                                                                                                                                                                                                                                                                                                                                - name: Commit
                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                  git config user.name "sangyo-tech"
                                                                                                                                                                                                                                                                                                                                                            git config user.email "noreply@sangyo-tech.jp"
                                                                                                                                                                                                                                                                                                                                                                      git add -A
                                                                                                                                                                                                                                                                                                                                                                                git diff --cached --quiet && echo "No changes" || git commit -m "fix(aio): fix typo + add FAQPage and BreadcrumbList JSON-LD" && git push
                                                                                                                                                                                                                                                                                                                                                                                      - name: Cleanup
                                                                                                                                                                                                                                                                                                                                                                                              if: always()
                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                git rm .github/workflows/fix-aio.yml
                                                                                                                                                                                                                                                                                                                                                                                                                          git commit -m "chore: remove fix-aio workflow"
                                                                                                                                                                                                                                                                                                                                                                                                                                    git push
