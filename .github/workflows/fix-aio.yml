name: Fix AIO metadata
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply fixes
        run: |
          python3 << 'PYEOF'
          with open('index.html', 'r') as f:
              t = f.read()
          t = t.replace('アhカデミー', 'アカデミー')
          if 'FAQPage' not in t:
              faq = '<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"産業技術アカデミーは誰が運営？","acceptedAnswer":{"@type":"Answer","text":"Qulio合同会社が運営する製造業向けeLラーニング。"}},{"@type":"Question","name":"どの業界の教材？","acceptedAnswer":{"@type":"Answer","text":"化粧品・医療機器・自動車部品・包装資材・食品・石油の6業界。"}},{"@type":"Question","name":"監修者は？","acceptedAnswer":{"@type":"Answer","text":"品質管理・品質保証・監査・教育に強い製造業実務経験者。"}}]}</script>\n<script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"トップ","item":"https://sangyo-tech.jp/"},{"@type":"ListItem","position":2,"name":"私たちについて","item":"https://about-us.sangyo-tech.jp/"}]}</script>\n'
              t = t.replace('</head>', faq + '</head>')
          with open('index.html', 'w') as f:
              f.write(t)
          print('Done')
          PYEOF
      - name: Commit
        run: |
          git config user.name sangyo-tech
          git config user.email noreply@sangyo-tech.jp
          git add -A
          git diff --cached --quiet && echo No changes || git commit -m "fix(aio): typo fix + FAQPage/BreadcrumbList" && git push
      - name: Cleanup
        if: always()
        run: |
          git pull --rebase
          git rm .github/workflows/fix-aio.yml
          git commit -m "chore: remove workflow" && git push
